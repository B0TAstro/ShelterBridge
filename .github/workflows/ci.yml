name: CI

# Runs our quality gates on every push to main and every pull request.
# Lint / typecheck / clippy behave the same across OSes, so macOS alone is
# enough (and cheaper) to catch regressions early.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Caches compiled Rust deps between runs so clippy stays fast.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Rustfmt (format check)
        run: pnpm rust:fmt:check

      - name: Clippy
        run: pnpm rust:lint

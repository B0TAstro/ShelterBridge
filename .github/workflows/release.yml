name: Release

# Builds the desktop app for macOS and Windows when a version tag is pushed
# (e.g. `git tag v0.0.1 && git push origin v0.0.1`), then creates a DRAFT
# GitHub Release with the .dmg / .msi artifacts for you to review and publish.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write # needed to create the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app and create the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ShelterBridge ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: true

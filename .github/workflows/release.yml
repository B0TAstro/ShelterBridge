name: 🚀 Release

# Linux targets will be added at v1.0.0.
on:
  push:
    branches: [main]

jobs:
  check-version:
    name: 🔎 Check version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # we need all tags to know if this version already shipped

      - name: 🔎 Read version and check tag
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "Tag v$VERSION already exists — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$VERSION — will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: 🏗️ Build ${{ matrix.suffix }}
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: mac-silicon
            platform: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: dmg
            ext: dmg
          - suffix: mac-intel
            platform: macos-latest
            rust_target: x86_64-apple-darwin
            bundles: dmg
            ext: dmg
          - suffix: windows
            platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundles: nsis
            ext: exe
    runs-on: ${{ matrix.platform }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: 💾 Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build the app
        run: pnpm tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: 🏷️ Rename artifact
        shell: bash
        run: |
          mkdir -p dist-release
          src=$(find "src-tauri/target/${{ matrix.rust_target }}/release/bundle" -type f -name "*.${{ matrix.ext }}" | head -n1)
          if [ -z "$src" ]; then
            echo "::error::No .${{ matrix.ext }} artifact found under the bundle directory"
            exit 1
          fi
          cp "$src" "dist-release/ShelterBridge-v${{ needs.check-version.outputs.version }}-${{ matrix.suffix }}.${{ matrix.ext }}"
          ls -la dist-release

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: dist-release/*
          if-no-files-found: error

  release:
    name: 📦 Publish release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the tag + GitHub Release
    steps:
      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-release
          merge-multiple: true

      - name: 🚀 Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          if [ "${{ needs.check-version.outputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "v${{ needs.check-version.outputs.version }}" \
            dist-release/* \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "ShelterBridge v${{ needs.check-version.outputs.version }}" \
            --notes "Automated release for v${{ needs.check-version.outputs.version }}." \
            $prerelease_flag
